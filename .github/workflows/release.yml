name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      # Asset names carry GOOS/GOARCH so rokit and mise (ubi) can pick
      # the right one for the host platform.
      - name: Build
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in darwin/arm64 darwin/amd64 linux/arm64 linux/amd64 windows/amd64; do
            GOOS=${target%/*} GOARCH=${target#*/}
            export GOOS GOARCH
            bin=ghget
            [ "$GOOS" = windows ] && bin=ghget.exe
            go build -trimpath -ldflags "-s -w" -o "$bin" .
            name="ghget-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
            if [ "$GOOS" = windows ]; then
              zip -q "dist/${name}.zip" "$bin"
            else
              tar czf "dist/${name}.tar.gz" "$bin"
            fi
            rm "$bin"
          done

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
